name: Build PatWiki Desktop App

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'src-tauri/**'
      - 'scripts/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Python dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pillow

      - name: Generate app icon
        run: python scripts/generate_icon.py

      - name: Build backend (PyInstaller)
        working-directory: backend
        run: pyinstaller patwiki_backend.spec --noconfirm

      - name: Verify backend artifact
        shell: pwsh
        run: |
          $exe = "backend/dist/patwiki-backend/patwiki-backend.exe"
          if (Test-Path $exe) {
            Write-Host "✅ 后端可执行文件已生成: $exe"
            $size = (Get-Item $exe).Length / 1MB
            Write-Host "   大小: $([math]::Round($size, 1)) MB"
          } else {
            Write-Host "❌ 后端可执行文件未找到"
            exit 1
          }

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Build Tauri app
        working-directory: .
        run: tauri build
        env:
          CI: true

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: patwiki-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn
          retention-days: 30

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: patwiki-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 30
